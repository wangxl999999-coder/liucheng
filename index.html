<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页版流程图工具</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <div class="toolbar-left">
                <h1>流程图工具</h1>
            </div>
            <div class="toolbar-center">
                <button id="btn-select" class="toolbar-btn active" title="选择工具 (V)">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M3,5.25L3,19.5L8.25,14.25H15.75L18.75,17.25V6.75L15.75,9.75H8.25L3,5.25Z"/>
                    </svg>
                </button>
                <button id="btn-connect" class="toolbar-btn" title="连线工具 (C)">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M11,9H13V7H11M12,20C7.59,20 4,16.41 4,12C4,7.59 7.59,4 12,4C16.41,4 20,7.59 20,12C20,16.41 16.41,20 12,20M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M11,17H13V11H11V17Z"/>
                    </svg>
                </button>
                <div class="toolbar-divider"></div>
                <select id="line-type" class="toolbar-select">
                    <option value="straight">直线</option>
                    <option value="polyline">折线</option>
                    <option value="curve">曲线</option>
                </select>
                <div class="toolbar-divider"></div>
                <button id="btn-delete" class="toolbar-btn" title="删除选中 (Delete)">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/>
                    </svg>
                </button>
                <button id="btn-clear" class="toolbar-btn" title="清空画布">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M20.5,20.5L12,12L3.5,20.5L2,19L10.5,10.5L2,2L3.5,0.5L12,9L20.5,0.5L22,2L13.5,10.5L22,19L20.5,20.5Z"/>
                    </svg>
                </button>
            </div>
            <div class="toolbar-right">
                <div class="export-group">
                    <button id="btn-export-png" class="toolbar-btn">导出PNG</button>
                    <button id="btn-export-pdf" class="toolbar-btn">导出PDF</button>
                    <button id="btn-export-svg" class="toolbar-btn">导出SVG</button>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧形状库 -->
            <aside class="shape-library">
                <h3>形状库</h3>
                <div class="shapes-container" id="shapes-container">
                    <div class="shape-item" draggable="true" data-shape="rectangle">
                        <canvas class="shape-preview" data-shape="rectangle" width="60" height="40"></canvas>
                        <span>矩形</span>
                    </div>
                    <div class="shape-item" draggable="true" data-shape="rounded-rectangle">
                        <canvas class="shape-preview" data-shape="rounded-rectangle" width="60" height="40"></canvas>
                        <span>圆角矩形</span>
                    </div>
                    <div class="shape-item" draggable="true" data-shape="diamond">
                        <canvas class="shape-preview" data-shape="diamond" width="60" height="40"></canvas>
                        <span>菱形</span>
                    </div>
                    <div class="shape-item" draggable="true" data-shape="circle">
                        <canvas class="shape-preview" data-shape="circle" width="60" height="40"></canvas>
                        <span>圆形</span>
                    </div>
                    <div class="shape-item" draggable="true" data-shape="parallelogram">
                        <canvas class="shape-preview" data-shape="parallelogram" width="60" height="40"></canvas>
                        <span>平行四边形</span>
                    </div>
                    <div class="shape-item" draggable="true" data-shape="trapezoid">
                        <canvas class="shape-preview" data-shape="trapezoid" width="60" height="40"></canvas>
                        <span>梯形</span>
                    </div>
                </div>
            </aside>

            <!-- 画布区域 -->
            <main class="canvas-container">
                <div class="canvas-wrapper" id="canvas-wrapper">
                    <canvas id="main-canvas"></canvas>
                    <canvas id="overlay-canvas"></canvas>
                    <!-- 文本编辑输入框 -->
                    <textarea id="text-editor" class="text-editor" spellcheck="false"></textarea>
                </div>
            </main>

            <!-- 右侧属性面板 -->
            <aside class="properties-panel">
                <h3>属性设置</h3>
                <div class="properties-group">
                    <label>填充颜色</label>
                    <input type="color" id="prop-fill-color" value="#ffffff">
                </div>
                <div class="properties-group">
                    <label>边框颜色</label>
                    <input type="color" id="prop-stroke-color" value="#000000">
                </div>
                <div class="properties-group">
                    <label>边框宽度</label>
                    <input type="number" id="prop-stroke-width" value="2" min="0" max="20">
                </div>
                <div class="properties-group">
                    <label>字体</label>
                    <select id="prop-font-family">
                        <option value="Arial">Arial</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Microsoft YaHei">微软雅黑</option>
                        <option value="SimSun">宋体</option>
                        <option value="SimHei">黑体</option>
                    </select>
                </div>
                <div class="properties-group">
                    <label>字号</label>
                    <input type="number" id="prop-font-size" value="14" min="8" max="72">
                </div>
                <div class="properties-group">
                    <label>字体颜色</label>
                    <input type="color" id="prop-font-color" value="#000000">
                </div>
                <div class="properties-group">
                    <label>文字对齐</label>
                    <div class="align-buttons">
                        <button class="align-btn active" data-align="left" title="左对齐">
                            <svg viewBox="0 0 24 24" width="16" height="16">
                                <path fill="currentColor" d="M3,3H21V5H3V3M3,7H15V9H3V7M3,11H21V13H3V11M3,15H15V17H3V15M3,19H21V21H3V19Z"/>
                            </svg>
                        </button>
                        <button class="align-btn" data-align="center" title="居中对齐">
                            <svg viewBox="0 0 24 24" width="16" height="16">
                                <path fill="currentColor" d="M3,3H21V5H3V3M7,7H17V9H7V7M3,11H21V13H3V11M7,15H17V17H7V15M3,19H21V21H3V19Z"/>
                            </svg>
                        </button>
                        <button class="align-btn" data-align="right" title="右对齐">
                            <svg viewBox="0 0 24 24" width="16" height="16">
                                <path fill="currentColor" d="M3,3H21V5H3V3M9,7H21V9H9V7M3,11H21V13H3V11M9,15H21V17H9V15M3,19H21V21H3V19Z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="properties-group">
                    <label>透明度</label>
                    <input type="range" id="prop-opacity" value="100" min="0" max="100">
                </div>
                <div class="properties-group">
                    <label>位置 X</label>
                    <input type="number" id="prop-x" value="0" step="1">
                </div>
                <div class="properties-group">
                    <label>位置 Y</label>
                    <input type="number" id="prop-y" value="0" step="1">
                </div>
                <div class="properties-group">
                    <label>宽度</label>
                    <input type="number" id="prop-width" value="100" min="20" step="1">
                </div>
                <div class="properties-group">
                    <label>高度</label>
                    <input type="number" id="prop-height" value="60" min="20" step="1">
                </div>
            </aside>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
